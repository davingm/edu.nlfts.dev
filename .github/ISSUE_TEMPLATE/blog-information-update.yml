name: Permohonan Perubahan Informasi atau Penghapusan Blog
description: Ajukan perubahan data blog Anda atau permohonan penghapusan dari platform EDU.
title: "[Blog Info] "
labels:
  - blog
body:
  - type: markdown
    attributes:
      value: |
        Gunakan template ini jika Anda ingin memperbarui informasi blog atau meminta penghapusan blog dari daftar EDU.

  - type: input
    id: blog_title
    attributes:
      label: Judul Blog
      description: Tuliskan judul blog yang ingin diperbarui atau dihapus.
      placeholder: ex, Cara Menggunakan Resend di Nuxt.js
    validations:
      required: true

  - type: input
    id: blog_url
    attributes:
      label: URL Blog
      description: Masukkan tautan blog yang sedang berlaku.
      placeholder: https://example.com

  - type: dropdown
    id: request_type
    attributes:
      label: Jenis Permohonan*
      description: Pilih salah satu.
      options:
        - Perubahan Informasi
        - Penghapusan Blog
        - Lainnya
    validations:
      required: true

  - type: textarea
    id: request_detail
    attributes:
      label: Detail Permohonan*
      description: Jelaskan perubahan atau alasan penghapusan.
      placeholder: ex, Saya ingin mengubah URL blog dan deskripsi singkat.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Catatan Tambahan
      description: Tambahkan informasi penting jika ada.
